<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>פרטי מוצר - MusicStore</title>
    <link rel="stylesheet" href="css/site.css" />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <main id="product-content"></main>

    <div id="footer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const id = getQueryParam('id');
            const product = DB.getProductById(id);

            if (!product) {
                document.getElementById('product-content').innerHTML = `
                    <section style="padding: 100px 0; text-align: center;">
                        <div class="container">
                            <div style="font-size: 80px; margin-bottom: 24px;">😕</div>
                            <h1 style="font-family: 'Playfair Display', serif;">מוצר לא נמצא</h1>
                            <a href="products.html" class="btn-primary" style="margin-top: 24px;">חזור לקטלוג</a>
                        </div>
                    </section>`;
                return;
            }

            document.title = `${product.ProductName} - MusicStore`;
            const category = DB.getCategoryById(product.CategoryID);
            const related = DB.getProducts().filter(p => p.CategoryID === product.CategoryID && p.ProductID !== product.ProductID).slice(0, 4);

            document.getElementById('product-content').innerHTML = `
                <section class="product-details">
                    <div class="container">
                        <div class="product-details-grid">
                            <div class="product-details-image">
                                <img src="${product.Image}" alt="${product.ProductName}" />
                            </div>
                            <div class="product-details-info">
                                <div class="breadcrumb">
                                    <a href="index.html">בית</a> / <a href="products.html">מוצרים</a>
                                    ${category ? ` / <a href="products.html?categoryId=${category.CategoryID}">${category.CategoryName}</a>` : ''}
                                </div>
                                <div class="brand">${product.Brand}</div>
                                <h1>${product.ProductName}</h1>
                                ${product.Stock > 0
                                    ? `<div class="stock-badge ${product.Stock < 5 ? 'low' : ''}">${product.Stock < 5 ? `● נותרו רק ${product.Stock} במלאי` : '● במלאי – זמין למשלוח מיידי'}</div>`
                                    : '<div class="stock-badge low">● אזל מהמלאי</div>'}
                                <div class="price">₪${formatPrice(product.Price)}</div>
                                <p class="description">${product.Description}</p>
                                <div class="quantity-selector">
                                    <label>כמות:</label>
                                    <div class="quantity-input">
                                        <button type="button" onclick="changeQty(-1)">−</button>
                                        <input type="number" id="qtyInput" value="1" min="1" max="${product.Stock}" />
                                        <button type="button" onclick="changeQty(1)">+</button>
                                    </div>
                                </div>
                                <button class="btn-buy" ${product.Stock === 0 ? 'disabled' : ''} onclick="addToCart(${product.ProductID})">🛒 הוסף לעגלה</button>
                                <div style="display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border);">
                                    <div style="color: var(--text-secondary); font-size: 14px;"><strong style="color:var(--gold);">🚚 משלוח חינם</strong><br>בקנייה מעל 500₪</div>
                                    <div style="color: var(--text-secondary); font-size: 14px;"><strong style="color:var(--gold);">🛡️ אחריות</strong><br>שנה מלאה</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                ${related.length ? `
                    <section style="background: var(--bg-secondary);">
                        <div class="container">
                            <div class="section-header"><h2>מוצרים <span class="gold-text">דומים</span></h2></div>
                            <div class="products-grid">${related.map(renderProductCard).join('')}</div>
                        </div>
                    </section>` : ''}
            `;
        });

        function changeQty(delta) {
            const i = document.getElementById('qtyInput');
            const v = parseInt(i.value) + delta;
            if (v >= 1 && v <= parseInt(i.max)) i.value = v;
        }

        function addToCart(id) {
            const q = parseInt(document.getElementById('qtyInput').value) || 1;
            Cart.add(id, q);
            const product = DB.getProductById(id);
            showAlert(`"${product.ProductName}" נוסף לעגלה (${q})`);
            renderHeader();
        }
    </script>
</body>
</html>

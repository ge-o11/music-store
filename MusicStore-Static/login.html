<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>התחברות - MusicStore</title>
    <link rel="stylesheet" href="css/site.css" />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <main>
        <div class="auth-page">
            <div class="auth-card">
                <div class="logo">
                    <span class="logo-icon">🎵</span>
                    <span class="logo-text">Music<span class="logo-accent">Store</span></span>
                </div>
                <h1>ברוך שובך</h1>
                <p class="subtitle">התחבר לחשבונך כדי להמשיך</p>

                <div class="demo-credentials">
                    <strong>👤 משתמש לדוגמה:</strong> user@demo.com / demo123<br />
                    <strong>👑 מנהל:</strong> admin@musicstore.com / admin123
                </div>

                <div id="error" style="display:none;" class="form-error"></div>

                <form onsubmit="doLogin(event)">
                    <div class="form-group">
                        <label>אימייל</label>
                        <input type="email" id="email" placeholder="your@email.com" required />
                    </div>
                    <div class="form-group">
                        <label>סיסמה</label>
                        <input type="password" id="password" placeholder="הזן סיסמה" required />
                    </div>
                    <button type="submit" class="btn-submit">התחבר</button>
                </form>

                <div class="auth-switch">
                    עוד אין לך חשבון? <a href="register.html">הרשם כאן</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        function doLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const user = Auth.login(email, password);
            if (user) location.href = user.IsAdmin ? 'admin.html' : 'index.html';
            else { const err = document.getElementById('error'); err.style.display = 'block'; err.textContent = 'אימייל או סיסמה שגויים'; }
        }
    </script>
</body>
</html>

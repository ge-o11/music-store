<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>הרשמה - MusicStore</title>
    <link rel="stylesheet" href="css/site.css" />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <main>
        <div class="auth-page">
            <div class="auth-card">
                <div class="logo">
                    <span class="logo-icon">🎵</span>
                    <span class="logo-text">Music<span class="logo-accent">Store</span></span>
                </div>
                <h1>צור חשבון</h1>
                <p class="subtitle">הצטרף לקהילת המוזיקאים שלנו</p>

                <div id="error" style="display:none;" class="form-error"></div>

                <form onsubmit="doRegister(event)">
                    <div class="form-group">
                        <label>שם מלא</label>
                        <input type="text" id="name" placeholder="ישראל ישראלי" required />
                    </div>
                    <div class="form-group">
                        <label>אימייל</label>
                        <input type="email" id="email" placeholder="your@email.com" required />
                    </div>
                    <div class="form-group">
                        <label>סיסמה</label>
                        <input type="password" id="password" placeholder="לפחות 6 תווים" required />
                    </div>
                    <div class="form-group">
                        <label>אימות סיסמה</label>
                        <input type="password" id="confirmPassword" placeholder="הזן שוב את הסיסמה" required />
                    </div>
                    <button type="submit" class="btn-submit">הרשם</button>
                </form>

                <div class="auth-switch">
                    כבר יש לך חשבון? <a href="login.html">התחבר כאן</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        function doRegister(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const err = document.getElementById('error');

            if (password !== confirm) { err.style.display = 'block'; err.textContent = 'הסיסמאות אינן תואמות'; return; }
            if (password.length < 6) { err.style.display = 'block'; err.textContent = 'הסיסמה חייבת להכיל לפחות 6 תווים'; return; }

            const user = Auth.register(name, email, password);
            if (!user) { err.style.display = 'block'; err.textContent = 'אימייל זה כבר רשום במערכת'; return; }
            location.href = 'index.html';
        }
    </script>
</body>
</html>

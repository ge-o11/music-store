<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>אישור הזמנה - MusicStore</title>
    <link rel="stylesheet" href="css/site.css" />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header"></div>
    <main id="content"></main>
    <div id="footer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const id = getQueryParam('id');
            const order = DB.getOrders().find(o => o.OrderID === Number(id));
            if (!order) { location.href = 'index.html'; return; }

            document.getElementById('content').innerHTML = `
                <section class="confirmation-page">
                    <div class="container">
                        <div class="confirmation-icon">✓</div>
                        <h1>תודה על הקנייה!</h1>
                        <p>ההזמנה שלך התקבלה בהצלחה ותטופל בקרוב</p>

                        <div class="order-summary">
                            <div style="display: flex; justify-content: space-between; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px;">
                                <strong>מספר הזמנה</strong>
                                <span class="gold-text" style="font-weight: 800; font-size: 18px;">#${order.OrderID}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 8px 0;"><span style="color: var(--text-secondary);">תאריך</span><span>${new Date(order.OrderDate).toLocaleString('he-IL')}</span></div>
                            <div style="display: flex; justify-content: space-between; padding: 8px 0;"><span style="color: var(--text-secondary);">סטטוס</span><span class="gold-text">${order.Status}</span></div>

                            <div style="margin: 20px 0; padding: 16px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);">
                                ${order.Items.map(i => `
                                    <div style="display: flex; justify-content: space-between; padding: 6px 0;">
                                        <span>${i.ProductName} × ${i.Quantity}</span>
                                        <span class="gold-text">₪${formatPrice(i.Price * i.Quantity)}</span>
                                    </div>`).join('')}
                            </div>

                            <div style="display: flex; justify-content: space-between; font-size: 20px; font-weight: 800;">
                                <span>סה"כ שולם</span>
                                <span class="gold-text">₪${formatPrice(order.TotalPrice)}</span>
                            </div>
                        </div>

                        <div style="display: flex; gap: 12px; justify-content: center;">
                            <a href="products.html" class="btn-primary">המשך לקנות</a>
                            <a href="my-orders.html" class="btn-secondary">ההזמנות שלי</a>
                        </div>
                    </div>
                </section>
            `;
        });
    </script>
</body>
</html>

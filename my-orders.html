<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ההזמנות שלי - MusicStore</title>
    <link rel="stylesheet" href="css/site.css" />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <main>
        <section class="page-header"><div class="container"><h1>ההזמנות <span class="gold-text">שלי</span></h1><p id="count"></p></div></section>
        <section style="padding: 40px 0;"><div class="container" id="orders-list"></div></section>
    </main>

    <div id="footer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.getCurrentUser();
            if (!user) { location.href = 'login.html'; return; }
            const orders = DB.getOrders().filter(o => o.UserID === user.UserID).sort((a, b) => new Date(b.OrderDate) - new Date(a.OrderDate));
            document.getElementById('count').textContent = `${orders.length} הזמנות עד כה`;
            const list = document.getElementById('orders-list');

            if (!orders.length) {
                list.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">📦</div>
                        <h2>אין הזמנות עדיין</h2>
                        <p>בוא נמצא משהו מיוחד בשבילך</p>
                        <a href="products.html" class="btn-primary">לחנות</a>
                    </div>`;
                return;
            }

            list.innerHTML = orders.map(o => `
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:16px; padding-bottom:16px; border-bottom: 1px solid var(--border);">
                        <div><div style="color: var(--text-muted); font-size: 13px;">הזמנה</div><div class="gold-text" style="font-weight:800; font-size:18px;">#${o.OrderID}</div></div>
                        <div><div style="color: var(--text-muted); font-size: 13px;">תאריך</div><div>${new Date(o.OrderDate).toLocaleDateString('he-IL')}</div></div>
                        <div><div style="color: var(--text-muted); font-size: 13px;">סטטוס</div><div class="gold-text" style="font-weight:700;">${o.Status}</div></div>
                        <div><div style="color: var(--text-muted); font-size: 13px;">סה"כ</div><div class="gold-text" style="font-size:22px; font-weight:900;">₪${formatPrice(o.TotalPrice)}</div></div>
                    </div>
                    <div>${o.Items.map(i => `<div style="display:flex; justify-content:space-between; padding: 6px 0; color: var(--text-secondary);"><span>${i.ProductName} × ${i.Quantity}</span><span>₪${formatPrice(i.Price * i.Quantity)}</span></div>`).join('')}</div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
